# Build installable Android APK/AAB via EAS for pilot rollout.
# Requires EXPO_TOKEN repository secret (expo.dev → Access Tokens).
name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

concurrency:
  group: dcb-frontend-eas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (${{ inputs.profile }})
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --no-wait
